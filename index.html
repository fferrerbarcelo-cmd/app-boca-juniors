<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>App Boca Juniors</title>
</head>
<body>

<h1>App Boca Juniors</h1>
<p>Registrate y unite a la 12</p>

<form action="https://formspree.io/f/mqejravd" method="POST">

  <fieldset>
    <legend>Datos Personales</legend>

    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Roman Riquelme" autocomplete="name" required>

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" name="email" placeholder="DiegoMaradona@bocajuniors.com" autocomplete="email" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" minlength="8" maxlength="64" required>

    <label for="edad">Edad</label>
    <input type="number" id="edad" name="edad" placeholder="Ej: 25" min="13" max="120" required>

    <label for="nacimiento">Fecha de nacimiento</label>
    <input type="date" id="nacimiento" name="nacimiento" min="1900-01-01" max="2015-12-31" required>

  </fieldset>

  <fieldset>
    <legend>Tu Perfil</legend>

    <label for="usuario">Nombre de usuario</label>
    <input type="text" id="usuario" name="usuario" placeholder="Ej: boca99" autocomplete="username" minlength="5" maxlength="12" pattern="[A-Za-z0-9]{5,12}" required aria-label="Nombre de usuario, entre 5 y 12 caracteres, solo letras y números">

    <p>Género</p>
    <input type="radio" id="masculino" name="genero" value="masculino" required>
    <label for="masculino">Masculino</label>
    <input type="radio" id="femenino" name="genero" value="femenino">
    <label for="femenino">Femenino</label>
    <input type="radio" id="otro" name="genero" value="otro">
    <label for="otro">Otro</label>

    <p>Intereses</p>
    <input type="checkbox" id="partidos" name="intereses" value="partidos">
    <label for="partidos">Partidos en vivo</label>
    <input type="checkbox" id="estadisticas" name="intereses" value="estadisticas">
    <label for="estadisticas">Estadísticas</label>
    <input type="checkbox" id="mercado" name="intereses" value="mercado">
    <label for="mercado">Mercado de pases</label>
    <input type="checkbox" id="historia" name="intereses" value="historia">
    <label for="historia">Historia del club</label>
    <input type="checkbox" id="entradas" name="intereses" value="entradas">
    <label for="entradas">Compra de entradas</label>

    <label for="bio">Biografía corta</label>
    <textarea id="bio" name="bio" placeholder="Contanos por qué sos hincha de Boca..." maxlength="300"></textarea>

  </fieldset>

  <fieldset>
    <legend>Ubicación</legend>

    <label for="pais">País</label>
    <select id="pais" name="pais" required>
      <option value="">Seleccioná tu país</option>
      <option value="AR">Argentina</option>
      <option value="BO">Bolivia</option>
      <option value="BR">Brasil</option>
      <option value="CL">Chile</option>
      <option value="UY">Uruguay</option>
      <option value="PY">Paraguay</option>
      <option value="ES">España</option>
      <option value="otro">Otro</option>
    </select>

    <label for="ciudad">Ciudad</label>
    <input type="text" id="ciudad" name="ciudad" placeholder="Escribí tu ciudad..." list="ciudades-lista" required aria-label="Ciudad de residencia, escribí para ver sugerencias">
    <datalist id="ciudades-lista">
      <option value="Buenos Aires">
      <option value="Rosario">
      <option value="Córdoba">
      <option value="Mendoza">
      <option value="La Plata">
      <option value="Montevideo">
      <option value="Santiago de Chile">
      <option value="Madrid">
    </datalist>

  </fieldset>

  <button type="submit">Registrarme</button>

</form>

<section>
  <h2>Soporte Técnico</h2>
  <p>¿Tenés algún problema con la app? Escribinos.</p>

  <form action="https://formspree.io/f/mqejravd" method="POST">

    <label for="contacto-nombre">Nombre</label>
    <input type="text" id="contacto-nombre" name="nombre" placeholder="Tu nombre" autocomplete="name" required>

    <label for="contacto-email">Email</label>
    <input type="email" id="contacto-email" name="email" placeholder="ejemplo@correo.com" autocomplete="email" required>

    <label for="motivo">Motivo de contacto</label>
    <select id="motivo" name="motivo" required>
      <option value="">Seleccioná un motivo</option>
      <option value="problema-tecnico">Problema técnico</option>
      <option value="cuenta">Problemas con mi cuenta</option>
      <option value="entradas">Compra de entradas</option>
      <option value="sugerencia">Sugerencia</option>
      <option value="otro">Otro</option>
    </select>

    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" name="mensaje" placeholder="Describí tu consulta..." minlength="20" maxlength="1000" required></textarea>

    <input type="checkbox" id="terminos" name="terminos" value="aceptado" required aria-label="Aceptar términos y condiciones, obligatorio para enviar">
    <label for="terminos">Acepto los términos y condiciones</label>

    <button type="submit">Enviar consulta</button>

  </form>
</section>

</body>
</html>
